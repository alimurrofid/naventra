services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: naventra-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    networks:
      - naventra-network
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: naventra-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - naventra-network
    depends_on:
      - app

  postgres:
    image: postgres:17-alpine
    container_name: naventra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: naventra
      POSTGRES_USER: naventra
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - naventra-network

networks:
  naventra-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
