services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: naventra-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    networks:
      - naventra-network
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: naventra-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - naventra-network
    depends_on:
      - app

  postgres:
    image: postgres:17-alpine
    container_name: naventra-postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: ${DB_DATABASE:-naventra}
      POSTGRES_USER: ${DB_USERNAME:-naventra}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432" # Bind only to localhost (S-06)
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - naventra-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: naventra-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevent host node_modules from overwriting container's
    networks:
      - naventra-network
    depends_on:
      - app

networks:
  naventra-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
